<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מעגל סגור | המערכת מתעוררת</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth-screen" class="overlay">
        <form id="registration-form" class="auth-box">
            <h2>זיהוי נדרש</h2>
            <p>המערכת נעולה. הרשם כדי לקבל גישה לפרוטוקול.</p>
            <input type="text" id="name" placeholder="שם מלא" required>
            <input type="email" id="email" placeholder="כתובת אימייל" required>
            <input type="date" id="dob" required>
            <button type="submit" id="submit-btn">התחבר למעגל</button>
            <p class="hint">כל השדות חובה | זיהוי אוטומטי פעיל</p>
        </form>
    </div>

    <div id="main-content" class="container hidden">
        <div class="scanline"></div>
        <div class="black-box"></div>

        <div class="timer-section main-timer">
            <span class="timer-label">זמן לחשיפה סופית</span>
            <div id="final-timer" class="glitch">--:--:--:--</div>
        </div>

        <div class="secondary-timers">
            <div class="timer-card">
                <span class="card-label">רמז יומי בעוד:</span>
                <div id="daily-timer" class="small-timer">--:--:--</div>
                <div id="daily-content" class="clue-display">מחפש נתונים...</div>
            </div>

            <div class="timer-card">
                <span class="card-label">דוח שבועי בעוד:</span>
                <div id="weekly-timer" class="small-timer">--:--:--</div>
                <div id="weekly-content" class="clue-display">ממתין לאיסוף...</div>
            </div>

            <div class="timer-card">
                <span class="card-label">פרוטוקול חודשי בעוד:</span>
                <div id="monthly-timer" class="small-timer">--:--:--</div>
                <div id="monthly-content" class="clue-display">בקידוד...</div>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
